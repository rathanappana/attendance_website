<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Expired</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: #0a0a0f; color: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; color: #ff5e5e; }
    p { color: #6b6b80; font-size: 14px; line-height: 1.7; }
  </style>
</head>
<body>
  <div>
    <div class="icon">⏱️</div>
    <h1>QR Code Expired</h1>
    <p>This QR code is no longer valid.<br/>Please scan the latest QR code displayed in the classroom.</p>
  </div>
  <script src="/footer.js"></script>
</body>
</html>
